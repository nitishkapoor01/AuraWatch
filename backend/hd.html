    <title>Search Results</title>

    <style>
        /* --- 1. RESET & DARK THEME BASE --- */
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #cccccc;
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; transition: color 0.2s; }
        a:hover { color: #fff; }

        /* --- 2. LAYOUT CONTAINER --- */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px 40px;
        }

        /* --- 3. HEADER --- */
        .search-header {
            margin-bottom: 20px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-logo { margin-bottom: 15px; }
        .header-logo img { max-width: 160px; height: auto; display: block; }

        /* --- SEARCH BAR --- */
        .search-bar-wrapper {
            display: flex;
            width: 100%;
            max-width: 600px;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-input {
            flex: 1;
            background-color: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 15px;
            font-size: 15px;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }
        
        .search-input:focus {
            border-color: #007bff;
            background-color: #161616;
        }

        .search-btn {
            background-color: #222;
            border: 1px solid #333;
            color: #aaa;
            padding: 0 15px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .search-btn:hover { background-color: #333; color: #fff; }

        /* --- NEW: COMPACT TRENDING RIBBON --- */
        .popular-searches-wrapper {
            width: 100%;
            max-width: 650px;
            margin-bottom: 15px;
            display: none; 
            animation: fadeIn 0.5s ease;
        }
        
        .popular-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 2px;
        }

        .popular-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            margin: 0;
        }

        /* The View All Icon/Button */
        .view-all-btn {
            font-size: 11px;
            color: #007bff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }
        .view-all-btn:hover { color: #fff; }

        /* Horizontal Scroll Container */
        .tags-container {
            display: flex;
            gap: 8px;
            overflow-x: auto; /* Enables horizontal scroll */
            padding-bottom: 5px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE */
            mask-image: linear-gradient(to right, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 95%, transparent 100%);
        }
        .tags-container::-webkit-scrollbar { display: none; /* Chrome/Safari */ }

        .search-tag {
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: #bbb;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            white-space: nowrap; /* Keeps tag on one line */
            flex-shrink: 0; /* Prevents squishing */
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .search-tag:hover {
            background-color: #2a2a2a;
            border-color: #007bff;
            color: #fff;
        }
        
        .search-tag i { margin-right: 4px; font-size: 10px; opacity: 0.6; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }


        /* --- TITLE & META --- */
        .search-title-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            width: 100%;
            /*margin-top: 5px;*/
            /*border-top: 1px solid #1a1a1a;*/
            /*padding-top: 15px;*/
        }
        .search-title { font-size: 20px; font-weight: 400; color: #fff; margin: 0; }
        .search-meta { font-size: 12px; color: #666; }

        /* --- MOVIE GRID --- */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px 12px;
            list-style: none;
            padding: 0;
            margin: 0;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        .movie-grid.faded { opacity: 0.5; pointer-events: none; }

        /* --- MOVIE CARD --- */
        .movie-card {
            position: relative;
            display: flex;
            flex-direction: column;
            background: #111111 !important;
        }

        .poster-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
            background-color: #1a1a1a;
            overflow: hidden;
            border-radius: 4px;
            margin-bottom: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .movie-card:hover .poster-wrapper {
            transform: scale(1.08);
            /*box-shadow: 0 0 0 2px #444;*/
        }

        .poster-wrapper img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            opacity: 0; 
            transition: opacity 0.3s;
        }
        .poster-wrapper img.loaded { opacity: 1; }

        .movie-title {
            font-size: 14px; line-height: 1.4;
            color: #ddd; font-weight: 400;
            padding: 0 4px;
            display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden;
        }
        .movie-card:hover .movie-title { color: #fff; }

        /* --- PAGINATION --- */
        .pagination-container {
            margin-top: 40px; display: flex;
            justify-content: center; padding-bottom: 40px;
        }
        .pagination {
            display: flex; list-style: none;
            padding: 0; gap: 4px; align-items: center;
        }
        .page-link {
            display: flex; align-items: center; justify-content: center;
            padding: 0 10px; height: 32px;
            background: #111; border: 1px solid #333;
            color: #aaa; font-size: 12px; border-radius: 3px;
            transition: all 0.2s; cursor: pointer; user-select: none;
        }
        .page-link:hover { background: #222; color: #fff; border-color: #555; }
        .page-link.active {
            background: #007bff; border-color: #007bff;
            color: #fff; font-weight: 600; pointer-events: none;
        }
        .page-link.dots { background: transparent; border: none; cursor: default; color: #666; }

        /* --- MODAL (POPUP) STYLES --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: none; /* Hidden by default */
            justify-content: center; align-items: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.open { display: flex; animation: fadeIn 0.3s ease; }

        .modal-content {
            background: #111;
            border: 1px solid #333;
            width: 100%; max-width: 600px;
            max-height: 80vh;
            border-radius: 8px;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-title { margin: 0; font-size: 16px; color: #fff; }
        .close-modal {
            background: none; border: none; color: #888;
            font-size: 24px; cursor: pointer; line-height: 1;
        }
        .close-modal:hover { color: #fff; }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            display: flex; flex-wrap: wrap; gap: 10px;
            align-content: flex-start;
        }
        /* Style for tags inside modal (allow wrapping) */
        .modal-body .search-tag {
            white-space: normal;
        }

        /* --- UTILITIES --- */
        .loading-overlay {
            grid-column: 1 / -1; text-align: center;
            padding: 60px 20px; color: #666;
            display: none;
        }
        .loading-overlay.active { display: block; }
        .error-msg {
            color: #ff6b6b; background: rgba(255, 107, 107, 0.1);
            padding: 15px; border-radius: 4px; text-align: center;
            margin: 20px 0; font-size: 14px; grid-column: 1 / -1;
        }
        .spinner {
            border: 2px solid #333; border-radius: 50%;
            border-top: 2px solid #007bff;
            width: 24px; height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mobile Tweaks */
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px 10px; }
            .search-header { align-items: center; text-align: center; }
            .search-bar-wrapper { margin: 0 auto 15px auto; }
            .popular-searches-wrapper { margin: 0 auto 15px auto; text-align: left; }
            /* Align scroll container left on mobile */
            .tags-container { justify-content: flex-start; }
        }
    </style>

<body>

<div class="container">
    <header class="search-header">
        <div class="header-logo">
            <a href="/"> 
                <img src="/wp-content/uploads/2021/05/hdhub4ulogo.png" alt="HDHub4U Logo">
            </a>
        </div>
        
        <center> <p style="margin: 0px;padding-bottom: 15px;"><a href="/" target="_self" type="button" class="__internal" style=" outline: 0; background-color: #333; border-radius: 3px; padding: 5px; color: white; display: inline; ">Go to HomePage 🏠</a></p> </center>

        <div class="search-bar-wrapper">
            <input type="text" id="main-search-input" class="search-input" placeholder="Search movies..." autocomplete="off">
            <button id="main-search-btn" class="search-btn" aria-label="Search">
                <span class="material-icons">search</span>
            </button>
        </div>

        <div class="popular-searches-wrapper" id="popular-wrapper">
            <div class="popular-header">
                <span class="popular-label">Trending (24h) 🔥</span>
                <span class="view-all-btn" onclick="openTrendingModal()">
                    View All <i class="fa fa-plus-circle" aria-hidden="true" style="margin-left:4px;"></i>
                </span>
            </div>
            <div id="popular-tags" class="tags-container">
                </div>
        </div>

        <div class="search-title-wrapper">
            <h1 class="search-title" id="page-title">Search</h1>
            <div class="search-meta" id="result-count"></div>
        </div>
    </header>

    <div id="app-content">
        <div class="loading-overlay" id="loader">
            <div class="spinner"></div><p>Loading results...</p>
        </div>
        <ul class="movie-grid" id="results-grid"></ul>
        <div class="pagination-container" id="pagination-wrapper" style="display:none;">
            <ul class="pagination" id="pagination-list"></ul>
        </div>
    </div>
</div>

<div class="modal-overlay" id="trending-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">Top 50 Trending 🔥</h2>
            <button class="close-modal" onclick="closeTrendingModal()">&times;</button>
        </div>
        <div class="modal-body" id="modal-tags-body">
            </div>
    </div>
</div>

<script>
    // --- GLOBAL HELPERS (Accessible by HTML onclick) ---
    
    // 1. Global store for tags
    window.allTrendingTags = [];

    // 2. Trigger Search
    window.triggerSearch = function(term) {
        const input = document.getElementById('main-search-input');
        if(input) {
            input.value = term;
            // Dispatch event to main logic
            const event = new CustomEvent('trigger-search-logic', { detail: term });
            document.dispatchEvent(event);
            // Close modal if open
            closeTrendingModal();
        }
    };

    // 3. Modal Logic
    window.openTrendingModal = function() {
        const modalBody = document.getElementById('modal-tags-body');
        
        // Render all 50 tags into modal
        if(window.allTrendingTags.length > 0) {
            const html = window.allTrendingTags.map(item => {
                const safeTerm = item.term.replace(/"/g, '&quot;');
                return `<div class="search-tag" onclick="triggerSearch('${safeTerm}')">
                            <i class="fa fa-search" aria-hidden="true"></i> ${safeTerm}
                        </div>`;
            }).join('');
            modalBody.innerHTML = html;
        } else {
            modalBody.innerHTML = '<p style="color:#666;">No trending data available.</p>';
        }
        
        document.getElementById('trending-modal').classList.add('open');
    };

    window.closeTrendingModal = function() {
        document.getElementById('trending-modal').classList.remove('open');
    };

    // Close on click outside
    document.getElementById('trending-modal').addEventListener('click', function(e) {
        if (e.target === this) closeTrendingModal();
    });

    document.addEventListener('DOMContentLoaded', function() {
        
        const CONFIG = {
            proxyUrl: "https://search.pingora.fyi/collections/post/documents/search",
            popularUrl: "https://search.pingora.fyi/collections/popular_searches/documents/search",
            perPage: 15
        };

        const els = {
            grid: document.getElementById('results-grid'),
            pagination: document.getElementById('pagination-list'),
            paginationWrapper: document.getElementById('pagination-wrapper'),
            loader: document.getElementById('loader'),
            count: document.getElementById('result-count'),
            title: document.getElementById('page-title'),
            searchInput: document.getElementById('main-search-input'),
            searchBtn: document.getElementById('main-search-btn'),
            popularWrapper: document.getElementById('popular-wrapper'),
            popularTags: document.getElementById('popular-tags')
        };

        let currentState = { query: '', page: 1 };

        // --- INITIAL LOAD ---
        const urlParams = new URLSearchParams(window.location.search);
        const initialQuery = urlParams.get('q');
        const initialPage = parseInt(urlParams.get('page')) || 1;

        // Fetch Trending
        fetchPopularSearches();

        if (initialQuery) {
            els.searchInput.value = initialQuery;
            updateStateAndFetch(initialQuery, initialPage, false);
        } else {
            els.grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">Start typing above to search.</div>';
            els.searchInput.focus();
        }

        // --- LISTENERS ---
        els.searchBtn.addEventListener('click', () => handleSearchInput(els.searchInput.value));
        
        els.searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearchInput(els.searchInput.value);
        });

        // Listen for the global trigger
        document.addEventListener('trigger-search-logic', (e) => {
            handleSearchInput(e.detail);
        });

        window.addEventListener('popstate', (event) => {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            const p = parseInt(params.get('page')) || 1;
            if (q) {
                els.searchInput.value = q;
                updateStateAndFetch(q, p, false);
            } else {
                els.searchInput.value = '';
                els.title.innerText = "Search";
                els.grid.innerHTML = '';
                els.paginationWrapper.style.display = 'none';
                els.count.innerText = '';
            }
        });

        els.pagination.addEventListener('click', (e) => {
            const link = e.target.closest('[data-page]');
            if (link) {
                e.preventDefault();
                const newPage = parseInt(link.dataset.page);
                if (newPage && newPage !== currentState.page) {
                    updateStateAndFetch(currentState.query, newPage, true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }
        });

        // --- FUNCTIONS ---
        function handleSearchInput(rawVal) {
            const val = rawVal.trim();
            if (!val) return;
            updateStateAndFetch(val, 1, true);
            els.searchInput.blur();
        }

        async function updateStateAndFetch(query, page, pushToHistory) {
            currentState.query = query;
            currentState.page = page;
            if (pushToHistory) {
                const newUrl = `${window.location.pathname}?q=${encodeURIComponent(query)}&page=${page}`;
                window.history.pushState({ query, page }, '', newUrl);
            }
            els.title.innerText = `Results for "${query}"`;
            await fetchResults(query, page);
        }

        // --- POPULAR SEARCHES ---
        async function fetchPopularSearches() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const yDate = new Date();
                yDate.setDate(yDate.getDate() - 1);
                const yesterday = yDate.toISOString().split('T')[0];

                const apiUrl = new URL(CONFIG.popularUrl);
                apiUrl.searchParams.append('q', '*');
                apiUrl.searchParams.append('query_by', 'q');
                apiUrl.searchParams.append('filter_by', `analytics_tag:=[${today},${yesterday}]`);
                apiUrl.searchParams.append('sort_by', 'count:desc');
                apiUrl.searchParams.append('per_page', 50); // Fetch 50

                const response = await fetch(apiUrl);
                if (!response.ok) return;

                const data = await response.json();
                if (!data.hits || data.hits.length === 0) return;

                const mergedMap = new Map();
                data.hits.forEach(hit => {
                    const term = hit.document.q;
                    const count = hit.document.count;
                    if(mergedMap.has(term)) {
                        mergedMap.set(term, mergedMap.get(term) + count);
                    } else {
                        mergedMap.set(term, count);
                    }
                });

                // Convert to array
                const sortedTags = Array.from(mergedMap.entries())
                    .map(([term, count]) => ({ term, count }))
                    .sort((a, b) => b.count - a.count);

                if (sortedTags.length === 0) return;

                // SAVE ALL TAGS GLOBALLY (For Modal)
                window.allTrendingTags = sortedTags;

                // RENDER ONLY TOP 20 IN RIBBON
                const top20 = sortedTags.slice(0, 20);
                const html = top20.map(item => {
                    const safeTerm = item.term.replace(/"/g, '&quot;');
                    return `<div class="search-tag" onclick="triggerSearch('${safeTerm}')">
                                <i class="fa fa-search" aria-hidden="true"></i> ${safeTerm}
                            </div>`;
                }).join('');

                els.popularTags.innerHTML = html;
                els.popularWrapper.style.display = 'block';

            } catch (err) {
                console.warn("Failed to load popular searches", err);
            }
        }

        async function fetchResults(query, page) {
            els.loader.classList.add('active');
            els.grid.classList.add('faded');
            const today = new Date().toISOString().split('T')[0];
            
            try {
                const apiUrl = new URL(CONFIG.proxyUrl);
                apiUrl.searchParams.append('q', query);
                apiUrl.searchParams.append('query_by', 'post_title,category,stars,director,imdb_id');
                apiUrl.searchParams.append('query_by_weights', '4,2,2,2,4');
                apiUrl.searchParams.append('sort_by', 'sort_by_date:desc');
                apiUrl.searchParams.append('limit', CONFIG.perPage);
                apiUrl.searchParams.append('highlight_fields', 'none');
                apiUrl.searchParams.append('use_cache', 'true');
                apiUrl.searchParams.append('page', page);
                apiUrl.searchParams.append('analytics_tag', today);

                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();
                renderPage(data);
            } catch (error) {
                els.grid.innerHTML = `<div class="error-msg">Error: ${error.message}. Please try again.</div>`;
            } finally {
                els.loader.classList.remove('active');
                els.grid.classList.remove('faded');
            }
        }

        function renderPage(data) {
            if (data.found === 0 || data.hits.length === 0) {
                els.count.innerText = "0 items";
                els.grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #666;">Oops ! No results found.<br>Please make sure to use correct spelling use google to get the correct then search</div>';
                els.paginationWrapper.style.display = 'none';
                return;
            }
            els.count.innerText = `${data.found} items`;
            const html = data.hits.map(hit => {
                const doc = hit.document;
                const thumb = doc.post_thumbnail || 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/315px-No-Image-Placeholder.svg.png?20200912122019';
                const link = doc.permalink;
                return `
                <li class="movie-card">
                    <a href="${link}">
                        <div class="poster-wrapper">
                            <img src="${thumb}" alt="${doc.post_title}" 
                                 onload="this.classList.add('loaded')"
                                 onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/315px-No-Image-Placeholder.svg.png?20200912122019'; this.classList.add('loaded')">
                        </div>
                        <h3 class="movie-title" title="${doc.post_title}">${doc.post_title}</h3>
                    </a>
                </li>`;
            }).join('');
            els.grid.innerHTML = html;
            renderPagination(data.found);
        }

        function renderPagination(totalHits) {
            const totalPages = Math.ceil(totalHits / CONFIG.perPage);
            const p = currentState.page;
            if (totalPages <= 1) { els.paginationWrapper.style.display = 'none'; return; }
            els.paginationWrapper.style.display = 'flex';
            let html = '';
            const createItem = (pageNum, content, isActive = false, isDots = false) => {
                if (isDots) return `<li><span class="page-link dots">...</span></li>`;
                const activeClass = isActive ? 'active' : '';
                return `<li><a href="?q=${encodeURIComponent(currentState.query)}&page=${pageNum}" 
                           class="page-link ${activeClass}" 
                           data-page="${pageNum}">${content}</a></li>`;
            };
            if (p > 1) html += createItem(p - 1, '<span class="material-icons" style="font-size:16px;">chevron_left</span>');
            let rangeStart = Math.max(1, p - 2);
            let rangeEnd = Math.min(totalPages, p + 2);
            if (rangeStart > 1) {
                html += createItem(1, '1', p === 1);
                if (rangeStart > 2) html += createItem(null, null, false, true);
            }
            for (let i = rangeStart; i <= rangeEnd; i++) html += createItem(i, i, i === p);
            if (rangeEnd < totalPages) {
                if (rangeEnd < totalPages - 1) html += createItem(null, null, false, true);
                html += createItem(totalPages, totalPages, p === totalPages);
            }
            if (p < totalPages) html += createItem(p + 1, '<span class="material-icons" style="font-size:16px;">chevron_right</span>');
            els.pagination.innerHTML = html;
        }
    });
</script>

</body>
</html>
