    <!-- Built-in Pop-Under / Popup Ad Blocker -->
    <script>
      (function() {
        // Known ad network domains to block
        var AD_DOMAINS = [
          'heavenlysuspicious','doubleclick','googlesyndication','adnxs',
          'popads','popcash','propellerads','clickadu','hilltopads',
          'trafficjunky','exoclick','juicyads','trafficstars','adsterra',
          'yllix','richpush','megapu.sh','ad-maven','advertisertape',
          'adcash','bidvertiser','revcontent','mgid','taboola',
          'outbrain','zedo','undertone','conversantmedia','advertising',
          'popunder','popup','ad-hub','adtng','adf.ly','linkvertise',
          'shorte.st','ouo.io','bc.vc','sub2unlock','adfly'
        ];

        // Override window.open to block popups/pop-unders
        var _originalOpen = window.open;
        window.open = function(url, name, features) {
          if (!url) return null;
          var urlStr = String(url).toLowerCase();
          
          // Allow blank/about pages (used by some legit apps)
          if (urlStr === '' || urlStr === 'about:blank') {
            return _originalOpen.apply(window, arguments);
          }

          // Block known ad domains
          for (var i = 0; i < AD_DOMAINS.length; i++) {
            if (urlStr.indexOf(AD_DOMAINS[i]) !== -1) {
              console.log('[AuraWatch Blocker] Blocked ad popup:', url);
              return null;
            }
          }

          // Block pop-unders (they usually have no name and random features)
          if (!name && typeof features === 'string' && features.indexOf('width') !== -1) {
            console.log('[AuraWatch Blocker] Blocked pop-under:', url);
            return null;
          }

          // Block if URL looks like a redirect/shortener
          if (/\/(go|click|out|redirect|track|aff)\//i.test(urlStr)) {
            console.log('[AuraWatch Blocker] Blocked redirect ad:', url);
            return null;
          }

          return _originalOpen.apply(window, arguments);
        };

        // Prevent focus-based pop-unders (window blur trick)
        var _lastClickTime = 0;
        document.addEventListener('click', function() {
          _lastClickTime = Date.now();
        }, true);

        window.addEventListener('blur', function() {
          // If window loses focus within 500ms of a click, it's likely a pop-under
          if (Date.now() - _lastClickTime < 500) {
            setTimeout(function() { window.focus(); }, 50);
          }
        });

        console.log('[AuraWatch] Built-in ad blocker active ✓');
      })();
    </script>
