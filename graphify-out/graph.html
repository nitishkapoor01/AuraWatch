<head>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #graph {
      flex: 1;
    }

    #sidebar {
      width: 280px;
      background: #1a1a2e;
      border-left: 1px solid #2a2a4e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #search-wrap {
      padding: 12px;
      border-bottom: 1px solid #2a2a4e;
    }

    #search {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #3a3a5e;
      color: #e0e0e0;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    #search:focus {
      border-color: #4E79A7;
    }

    #search-results {
      max-height: 140px;
      overflow-y: auto;
      padding: 4px 12px;
      border-bottom: 1px solid #2a2a4e;
      display: none;
    }

    .search-item {
      padding: 4px 6px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-item:hover {
      background: #2a2a4e;
    }

    #info-panel {
      padding: 14px;
      border-bottom: 1px solid #2a2a4e;
      min-height: 140px;
    }

    #info-panel h3 {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #info-content {
      font-size: 13px;
      color: #ccc;
      line-height: 1.6;
    }

    #info-content .field {
      margin-bottom: 5px;
    }

    #info-content .field b {
      color: #e0e0e0;
    }

    #info-content .empty {
      color: #555;
      font-style: italic;
    }

    .neighbor-link {
      display: block;
      padding: 2px 6px;
      margin: 2px 0;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-left: 3px solid #333;
    }

    .neighbor-link:hover {
      background: #2a2a4e;
    }

    #neighbors-list {
      max-height: 160px;
      overflow-y: auto;
      margin-top: 4px;
    }

    #legend-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    #legend-wrap h3 {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
    }

    .legend-item:hover {
      background: #2a2a4e;
      padding-left: 4px;
    }

    .legend-item.dimmed {
      opacity: 0.35;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .legend-count {
      color: #666;
      font-size: 11px;
    }

    #stats {
      padding: 10px 14px;
      border-top: 1px solid #2a2a4e;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>

    const container = document.getElementById('graph');
    const network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, {
      physics: {

    network.once('stabilizationIterationsDone', () => {
      network.setOptions({ physics: { enabled: false } });

    function showInfo(nodeId) {
      const n = nodesDS.get(nodeId);

      const neighborIds = network.getConnectedNodes(nodeId);

        const color = nb ? nb.color.background : '#555';
        return `<span class="neighbor-link" style="border-left-color:${esc(color)}" onclick="focusNode(${JSON.stringify(nid)})">${esc(nb ? nb.label : nid)}</span>`;

  <script>
    // Render hyperedges as shaded regions
    const hyperedges = [{ "id": "backend_api", "label": "Backend API Structure", "nodes": ["auth_routes", "movies_routes", "admin_routes", "favorites_routes", "tracking_routes"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 0.9 }, { "id": "frontend_state_management", "label": "Frontend State Management", "nodes": ["auth_context", "theme_context"], "relation": "form", "confidence": "EXTRACTED", "confidence_score": 0.95 }, { "id": "scrapper_system", "label": "Scrapper Subsystem", "nodes": ["moviecrawler_scrapper", "resolver_utils", "logger_utils"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 0.9 }];
    // afterDrawing passes ctx already transformed to network coordinate space.
    // Draw node positions raw — no manual pan/zoom/DPR math needed.
    network.on('afterDrawing', function (ctx) {
      hyperedges.forEach(h => {
        const positions = h.nodes
          .map(nid => network.getPositions([nid])[nid])
          .filter(p => p !== undefined);
        if (positions.length < 2) return;
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#6366f1';
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        // Centroid and expanded hull in network coordinates
        const cx = positions.reduce((s, p) => s + p.x, 0) / positions.length;
        const cy = positions.reduce((s, p) => s + p.y, 0) / positions.length;
        const expanded = positions.map(p => ({
          x: cx + (p.x - cx) * 1.15,
          y: cy + (p.y - cy) * 1.15
        }));
        ctx.moveTo(expanded[0].x, expanded[0].y);
        expanded.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.stroke();
        // Label
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#4f46e5';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(h.label, cx, cy - 5);
        ctx.restore();
      });
    });
  </script>
